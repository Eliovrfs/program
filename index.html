<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f8fafc;
}

header {
  background: white;
  padding: 20px;
  border-bottom: 1px solid #ddd;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>
<body>

<header>VRFS Program</header>

<div class="container">
  <div class="card">
    <h2>About</h2>
    <p>Explain your program here.</p>
  </div>

  <div class="card">
    <h2>Features</h2>
    <ul>
      <li>Fast</li>
      <li>Smart</li>
      <li>Community Driven</li>
    </ul>
  </div>

  <button onclick="window.open('https://discord.gg/YOUR-LINK')">
    Join Discord
  </button>
</div>

</body>
</html>
