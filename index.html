<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VRFS Program</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #0f172a;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      color: #2563eb;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #334155;
      font-weight: 500;
    }

    nav a:hover {
      color: #2563eb;
    }

    /* AI BUTTON */
    .ai-button {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: white;
      padding: 12px 16px;
      border-radius: 0 10px 10px 0;
      font-weight: 600;
      cursor: pointer;
      z-index: 1000;
      transition: 0.3s;
    }

    .ai-button:hover {
      transform: translateY(-50%) translateX(5px);
    }

    .hero {
      text-align: center;
      padding: 100px 20px 60px;
    }

    .hero h2 {
      font-size: 42px;
    }

    .hero button {
      margin-top: 25px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #64748b;
    }
  </style>
</head>
<body>

<!-- AI BUTTON -->
<div class="ai-button" onclick="goToAI()">🤖 AI</div>

<header>
  <h1>VRFS</h1>
  <nav>
    <a href="#features">Features</a>
    <a href="#about">About</a>
    <a href="#join">Join</a>
  </nav>
</header>

<section class="hero">
  <h2>Next-Gen Discord Program</h2>
  <button onclick="joinDiscord()">Join Discord</button>
</section>

<div class="container">
  <div id="about" class="card">
    <h3>About VRFS</h3>
    <p>Modern Discord system with powerful tools.</p>
  </div>
</div>

<footer>
  © 2026 VRFS
</footer>

<script>
  function joinDiscord() {
    window.open("https://discord.gg/fFvHPang", "_blank");
  }

  function goToAI() {
    window.location.href = "/ai";
  }
</script>

</body>
</html>
