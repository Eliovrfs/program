<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0f;
  color: white;
}

.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 60px;
  color: #00f0ff;
  text-shadow: 0 0 20px #00f0ff;
}

.hero p {
  color: #aaa;
}

button {
  padding: 12px 20px;
  background: linear-gradient(45deg, #00f0ff, #ff00ff);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
}
</style>
</head>
<body>

<div class="hero">
  <h1>VRFS Program</h1>
  <p>Your Discord-powered system</p>
  <button onclick="window.open('https://discord.gg/YOUR-LINK')">
    Join Discord
  </button>
</div>

</body>
</html>
