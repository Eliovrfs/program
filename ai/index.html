<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VRFS AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      background: #1e293b;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #334155;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<header>🤖 VRFS AI</header>

<div id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = input.value;
  if (!userText) return;

  // Show user message
  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = userText;
  chat.appendChild(userMsg);

  input.value = "";

  // Scroll down
  chat.scrollTop = chat.scrollHeight;

  // Call AI
  const response = await fetch(
    "https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta",
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_API_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ inputs: userText })
    }
  );

  const data = await response.json();

  const aiText = data[0]?.generated_text || "No response";

  // Show AI message
  const aiMsg = document.createElement("div");
  aiMsg.className = "message ai";
  aiMsg.innerText = aiText.replace(userText, "");
  chat.appendChild(aiMsg);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
