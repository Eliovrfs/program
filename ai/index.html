<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VRFS AI</title>
</head>
<body>

<h1>AI Chat</h1>

<div id="chat"></div>

<input id="input" placeholder="Type..." />
<button onclick="send()">Send</button>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = input.value;
  if (!userText) return;

  chat.innerHTML += "<p><b>You:</b> " + userText + "</p>";

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer 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",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ inputs: userText })
      }
    );

    const data = await response.json();

    if (data.error) {
      chat.innerHTML += "<p><b>AI:</b> " + data.error + "</p>";
    } else {
      const aiText = data[0]?.generated_text || "No response";
      chat.innerHTML += "<p><b>AI:</b> " + aiText.replace(userText, "") + "</p>";
    }

  } catch (err) {
    chat.innerHTML += "<p><b>AI:</b> Error connecting to AI</p>";
  }

  input.value = "";
}
</script>

</body>
</html>
