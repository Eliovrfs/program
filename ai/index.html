<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VRFS AI</title>
  <style>
    body { font-family: 'Inter', sans-serif; padding: 20px; background: #eef2ff; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; background: white; margin-bottom: 10px; border-radius: 10px; }
    input { width: 80%; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 8px; }
    p { margin: 5px 0; }
  </style>
</head>
<body>

<h1>AI Chat</h1>

<div id="chat"></div>

<input id="input" placeholder="Type..." />
<button onclick="send()">Send</button>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const userText = input.value;
  if (!userText) return;

  chat.innerHTML += "<p><b>You:</b> " + userText + "</p>";
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch(
      "https://cors-anywhere.herokuapp.com/https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer 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",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ inputs: userText })
      }
    );

    const data = await response.json();

    if (data.error) {
      chat.innerHTML += "<p><b>AI:</b> " + data.error + "</p>";
    } else {
      const aiText = data[0]?.generated_text || "No response";
      chat.innerHTML += "<p><b>AI:</b> " + aiText.replace(userText, "") + "</p>";
    }

  } catch (err) {
    chat.innerHTML += "<p><b>AI:</b> Error connecting to AI</p>";
    console.error(err);
  }

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
